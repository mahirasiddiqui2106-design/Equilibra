<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Equilibra | Login</title>
    <link rel="stylesheet" href="login.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="auth-page">

    <!-- BRAND -->
    <h1 class="auth-logo">EQUILIBRA</h1>
    <p class="auth-tagline">Because burnout is not a feature.</p>

    <!-- LOGIN CARD -->
    <div class="auth-card">

        <h2>Welcome back</h2>
        <p class="auth-sub">Login to continue your balance</p>

        <input type="email" placeholder="Email">
        <input type="password" placeholder="Password">

        <button class="primary-btn">Login</button>

        <div class="auth-links">
            <a href="#">Forgot password?</a>
            <span>•</span>
            <a href="#">Login with OTP</a>
        </div>

        <div class="divider">or</div>

        <button class="secondary-btn">Create a new account</button>

    </div>

</div>

</body>
</html>
